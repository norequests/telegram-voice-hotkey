name: Build macOS App

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install gperf cmake openssl ffmpeg

      - name: Cache TDLib
        id: cache-tdlib
        uses: actions/cache@v4
        with:
          path: tdlib-local
          key: tdlib-${{ runner.os }}-${{ runner.arch }}-v1

      - name: Build TDLib from source
        if: steps.cache-tdlib.outputs.cache-hit != 'true'
        run: |
          chmod +x scripts/setup-tdlib.sh
          scripts/setup-tdlib.sh

      - name: Build and bundle
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Zip app
        run: zip -r VoiceToSlop-macOS.zip VoiceToSlop.app

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: VoiceToSlop-macOS.zip
